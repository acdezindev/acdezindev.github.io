<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty - Demo</title>
    <style>
        /* ===== RESET MÍNIMO ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: #8b5cf6;
            margin-bottom: 25px;
        }

        /* ===== VIDEO ===== */
        video {
            width: 100%;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        /* ===== BOTÓN VOLVER ===== */
        .volver {
            display: inline-block;
            margin-top: 25px;
            color: #aaa;
            text-decoration: none;
            border: 1px solid #555;
            padding: 8px 20px;
            border-radius: 6px;
            transition: 0.3s;
            font-size: 14px;
        }

        .volver:hover {
            background: #333;
            color: white;
            border-color: #888;
        }

        /* ===== MÓVILES ===== */
        @media (max-width: 600px) {
            h1 {
                font-size: 18px;
                margin-bottom: 20px;
            }
            .volver {
                font-size: 13px;
                padding: 6px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📹 Rick and Morty App</h1>

        <video controls autoplay>
            <source src="videos/RickMorty.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>

        <br>
        <a href="index.html" class="volver">← Volver al portafolio</a>
    </div>

</body>
</html>
