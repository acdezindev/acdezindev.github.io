<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 380px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 18px;
            color: #8b5cf6;
            margin-bottom: 20px;
        }

        /* ===== MARCO DE MÓVIL ===== */
        .movil {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 30px;
            box-shadow: 0 0 0 2px #2a2a2a, 0 20px 60px rgba(0,0,0,0.9);
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 18px;
        }

        /* ===== BOTÓN VOLVER ===== */
        .volver {
            display: inline-block;
            margin-top: 25px;
            color: #aaa;
            text-decoration: none;
            border: 1px solid #555;
            padding: 8px 20px;
            border-radius: 6px;
            transition: 0.3s;
            font-size: 14px;
        }

        .volver:hover {
            background: #333;
            color: white;
            border-color: #888;
        }

        /* ===== MÓVILES PEQUEÑOS ===== */
        @media (max-width: 450px) {
            .container {
                max-width: 100%;
            }
            .movil {
                padding: 8px;
                border-radius: 20px;
            }
            video {
                border-radius: 12px;
            }
            h1 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Rick and Morty App</h1>

        <div class="movil">
            <video controls autoplay>
                <source src="videos/RickMorty.mp4" type="video/mp4">
                <source src="src/videos/RickMorty.mp4" type="video/mp4">
                Tu navegador no soporta videos.
            </video>
        </div>

        <br>
        <a href="index.html" class="volver">← Volver al portafolio</a>
    </div>

</body>
</html>
