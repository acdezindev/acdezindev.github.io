# ── Sobre ti ────────────────────────────────────────────────────────────
about: |
  Técnico Superior en Desarrollo de Aplicaciones Multiplataforma con todas las asignaturas aprobadas.
  Actualmente busco prácticas (FCT) en Málaga para obtener el título y comenzar mi carrera como desarrollador.

  Antes de dar este salto a la programación, trabajé durante 20 años en retail tecnológico en El Corte Inglés,
  asesorando a clientes y desarrollando una sólida visión comercial y de producto.

  Mi objetivo es combinar mi experiencia comercial con mis conocimientos técnicos para crear soluciones
  centradas en el usuario. Estoy abierto a oportunidades en backend, aplicaciones empresariales o desarrollo móvil.

