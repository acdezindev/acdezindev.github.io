
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyro - Demo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 320px;  /* Tamaño de móvil pequeño */
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 16px;
            color: #8b5cf6;
            margin-bottom: 15px;
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        .volver {
            display: inline-block;
            margin-top: 20px;
            color: #aaa;
            text-decoration: none;
            border: 1px solid #555;
            padding: 6px 16px;
            border-radius: 6px;
            transition: 0.3s;
            font-size: 13px;
        }

        .volver:hover {
            background: #333;
            color: white;
            border-color: #888;
        }

        @media (max-width: 400px) {
            .container {
                max-width: 100%;
            }
            h1 {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Spyro Guia Interactiva - App</h1>

        <video controls autoplay>
            <source src="src/videos/Spyroguia.mp4" type="video/mp4">
            Tu navegador no soporta videos.
        </video>

        <br>
        <a href="index.html" class="volver">← Volver al portafolio</a>
    </div>

</body>
</html>
